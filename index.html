<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- The title tag for the portfolio website, it appears on the browser tab -->
    <title>Sarwagya Singh - Portfolio</title>

    <!-- Specifies the character encoding for the document as UTF-8 -->
    <meta charset="UTF-8" />

    <!-- Canonical link to specify the preferred version of the website -->
    <link rel="canonical" href="https://0xsarwagya.codes/" />

    <!-- Meta tag for search engines to index relevant keywords -->
    <meta
      name="keywords"
      content="Sarwagya Singh, 0xsarwagya, Sarwagya, Singh, Portfolio, Web3, Web Development, Cybersecurity"
    />

    <!-- Meta tag to define the author of the webpage -->
    <meta name="author" content="Sarwagya Singh" />

    <!-- Viewport settings for mobile responsiveness, ensuring proper scaling and control -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <!-- Specifies the theme color for the web page, used on mobile browsers for UI -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Link to the favicon image, which is shown in the browser tab -->
    <link rel="icon" type="image/png" href="/memoji.png" />

    <!-- Meta description for the webpage, it shows up in search results and as a preview on social media -->
    <meta
      name="description"
      content="Hi, my name is Sarwagya Singh. Cybersecurity, web dev, Web3 enthusiast. Currently transitioning"
    />

    <!-- Robots meta tag to guide search engine crawlers on how to index the page -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph meta tags for Facebook, LinkedIn, and other social media -->
    <meta property="og:title" content="Sarwagya Singh - Portfolio" />
    <meta property="og:type" content="website" />
    <!-- URL for the image that represents the website when shared on social media -->
    <meta
      property="og:image"
      content="https://pbs.twimg.com/profile_banners/1591862626921115648/1714180802/1500x500"
    />
    <!-- Open Graph URL for the portfolio website -->
    <meta property="og:url" content="https://0xsarwagya.codes/" />
    <meta
      property="og:image:url"
      content="https://pbs.twimg.com/profile_banners/1591862626921115648/1714180802/1500x500"
    />
    <!-- Alt text for the Open Graph image -->
    <meta property="og:image:alt" content="Sarwagya Singh - Portfolio" />

    <!-- Twitter card meta tags for customizing how the page looks when shared on Twitter -->
    <meta name="twitter:creator" content="@0xsarwagya" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <!-- Image URL for the Twitter card -->
    <meta
      content="https://pbs.twimg.com/profile_banners/1591862626921115648/1714180802/1500x500"
      name="twitter:image"
    />
    <!-- Twitter card type, summary_large_image makes the post appear with a large image -->
    <meta content="summary_large_image" name="twitter:card" />
    <!-- Title for the Twitter card -->
    <meta content="Sarwagya Singh - Portfolio" name="twitter:title" />
    <!-- Description for the Twitter card -->
    <meta
      content="Hi, my name is Sarwagya Singh. Cybersecurity, web dev, Web3 enthusiast."
      name="twitter:description"
    />
    <!-- Twitter account for the portfolio -->
    <meta content="@0xsarwagya" name="twitter:site" />

    <!-- Google site verification meta tag for SEO purposes -->
    <meta
      name="google-site-verification"
      content="yo2frn-tk1Yi7L-3F7kPWaP6Ub2LA6mNu3TqDteje1w"
    />

    <!-- External script for website analytics (Umami) -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="3c9638a6-5e65-4bc7-b159-4ad8c4e880ec"
    ></script>
  </head>

  <body class="bg-black">
    <!-- Main container where the React app is mounted -->
    <div id="root"></div>

    <!-- The main TypeScript file for the React app -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
